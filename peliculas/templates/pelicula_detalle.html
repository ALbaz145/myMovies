{% extends "base.html" %}

{% block content %}
<section class="page">
  <header class="page-header">
    <h1>{{ pelicula.titulo }}</h1>
    <p>{{ pelicula.fecha_lanzamiento }} · {{ pelicula.pais_origen }} · {{ pelicula.duracion }}</p>
  </header>

  <div class="card">
    {% if pelicula.imagen %}
      <img class="card-img" src="{{ pelicula.imagen.url }}" alt="{{ pelicula.titulo }}">
    {% endif %}

    <p style="margin-top: 12px; color: var(--muted);">
      Estudio: {{ pelicula.estudio.nombre }}
    </p>

    <p style="margin-top: 12px;">
      {{ pelicula.descripcion }}
    </p>
  </div>

  <p style="margin-top: 14px;">
    <a class="btn" href="/peliculas/">Volver</a>
  </p>
</section>
{% endblock %}
