{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MyMovies{% endblock %}</title>

  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="stylesheet" href="{% static 'peliculas/styles.css' %}">

  <style>
    /* Estilos base para lograr el look de la app "Azure Cine-Synapse" */
    body {
      background: radial-gradient(circle at top right, #1e1b4b, #020617 60%);
      background-color: #020617;
      color: white;
      min-height: 100vh;
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    .text-neon {
      color: #00f2ff;
      text-shadow: 0 0 10px rgba(0, 242, 255, 0.4);
    }

    /* Navbar personalizada */
    .navbar {
      background-color: rgba(2, 6, 23, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .nav-link {
      transition: all 0.3s ease;
      position: relative;
    }

    .nav-link:hover {
      color: #00f2ff;
    }

    .nav-link.active::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 100%;
      height: 2px;
      background-color: #00f2ff;
      box-shadow: 0 0 10px #00f2ff;
    }

    /* Botón de Neón */
    .btn-neon {
      background-color: #00f2ff;
      color: #020617;
      font-weight: bold;
      border-radius: 9999px;
      padding: 0.75rem 1.5rem;
      transition: all 0.3s ease;
    }

    .btn-neon:hover {
      box-shadow: 0 0 20px rgba(0, 242, 255, 0.6);
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <header class="navbar">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">
      <a class="text-2xl font-bold tracking-tighter flex items-center gap-2" href="{% url 'home' %}">
        <span class="text-neon">🎬</span> MyMovies
      </a>

      <nav class="flex items-center gap-8 font-semibold uppercase text-xs tracking-widest">
        <a href="{% url 'home' %}" class="nav-link {% if request.resolver_match.url_name == 'home' %}active text-neon{% endif %}">Inicio</a>
        <a href="{% url 'peliculas' %}" class="nav-link {% if request.resolver_match.url_name == 'peliculas' %}active text-neon{% endif %}">Películas</a>
        <a href="{% url 'login' %}" class="nav-link {% if request.resolver_match.url_name == 'login' %}active text-neon{% endif %}">Iniciar Sesión</a>
        <button class="text-lg hover:text-neon transition">🔍</button>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}
    <div class="container mx-auto px-6 py-20 text-center">
      <div class="bg-slate-900/50 border border-slate-800 p-10 rounded-2xl inline-block">
        <h1 class="text-4xl font-bold mb-4">Base de Proyecto</h1>
        <p class="text-slate-400">La plantilla base se ha cargado con éxito. Empieza a crear tus vistas.</p>
      </div>
    </div>
    {% endblock %}
  </main>

  <footer class="mt-20 py-10 border-t border-slate-900 text-center text-slate-500 text-sm">
    <div class="container mx-auto px-6">
      <p>MyMovies - Programación Web &copy; 2026</p>
    </div>
  </footer>
</body>
</html>
