{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MyMovies{% endblock %}</title>

  <link rel="stylesheet" href="{% static 'peliculas/styles.css' %}">
</head>

<body>
  <header class="navbar">
    <div class="container navbar-inner">
      <a class="brand" href="{% url 'home' %}">MyMovies</a>

      <nav class="navlinks">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'peliculas' %}">Películas</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <div class="container">
      {% block content %}
      <div class="card">
        <h1>Base</h1>
        <p>Plantilla base cargada correctamente.</p>
      </div>
      {% endblock %}
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      Proyecto - Programación Web
    </div>
  </footer>
</body>
</html>
